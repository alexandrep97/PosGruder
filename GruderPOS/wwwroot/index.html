<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>POS GRUDER</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav id="sidebar">
        <div class="sidebar-logo">
            <img src="assets/logo.jpg" alt="GRUDER" class="logo-img">
        </div>
        <div class="nav-items">
            <a href="#" class="nav-item active" data-page="pos" onclick="app.navigate('pos')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 2H7c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H7V4h10v16zM8 5h8v2H8V5zm0 4h4v2H8V9zm0 4h8v2H8v-2z"/></svg>
                <span>Caixa</span>
            </a>
            <a href="#" class="nav-item" data-page="history" onclick="app.navigate('history')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                <span>Histórico</span>
            </a>
            <a href="#" class="nav-item" data-page="settings" onclick="app.navigate('settings')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>Definições</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <div id="session-indicator" class="session-closed">
                <span class="session-dot"></span>
                <span id="session-text">Caixa Fechada</span>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content">
        <!-- POS Page -->
        <div id="page-pos" class="page active">
            <div class="pos-layout">
                <!-- Products Panel -->
                <div class="products-panel">
                    <div class="products-header">
                        <h2>Produtos</h2>
                        <div id="category-tabs" class="category-tabs"></div>
                    </div>
                    <div id="products-grid" class="products-grid"></div>
                </div>
                <!-- Cart Panel -->
                <div class="cart-panel">
                    <div class="cart-header">
                        <h2>Conta</h2>
                        <button class="btn-icon btn-clear" onclick="pos.clearCart()" title="Limpar">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </div>
                    <div id="cart-items" class="cart-items">
                        <div class="cart-empty">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48" opacity="0.3"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                            <p>Sem artigos</p>
                        </div>
                    </div>
                    <div class="cart-footer">
                        <div class="cart-total">
                            <span>TOTAL</span>
                            <span id="cart-total-value">0,00 €</span>
                        </div>
                        <div class="payment-methods">
                            <button class="payment-btn active" data-method="Cash" onclick="pos.setPaymentMethod('Cash')">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                                Dinheiro
                            </button>
                            <button class="payment-btn" data-method="Card" onclick="pos.setPaymentMethod('Card')">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                                Cartão
                            </button>
                            <button class="payment-btn" data-method="MBWay" onclick="pos.setPaymentMethod('MBWay')">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
                                MB Way
                            </button>
                        </div>
                        <button id="btn-pay" class="btn-pay" onclick="pos.processPayment()" disabled>
                            <span>PAGAR</span>
                            <span id="btn-pay-total">0,00 €</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Page -->
        <div id="page-history" class="page">
            <div class="page-content">
                <div class="page-header">
                    <h2>Histórico</h2>
                </div>
                <div class="history-tabs">
                    <button class="tab-btn active" onclick="history.showTab('transactions')">Transações</button>
                    <button class="tab-btn" onclick="history.showTab('sessions')">Sessões de Caixa</button>
                </div>
                <div id="history-content" class="history-content"></div>
            </div>
        </div>

        <!-- Settings Page -->
        <div id="page-settings" class="page">
            <div class="page-content">
                <div class="page-header">
                    <h2>Definições</h2>
                </div>
                <div class="settings-tabs">
                    <button class="tab-btn active" onclick="settings.showTab('categories')">Categorias</button>
                    <button class="tab-btn" onclick="settings.showTab('products')">Produtos</button>
                    <button class="tab-btn" onclick="settings.showTab('receipt')">Layout Talão</button>
                    <button class="tab-btn" onclick="settings.showTab('printer')">Impressora</button>
                    <button class="tab-btn" onclick="settings.showTab('general')">Geral</button>
                </div>
                <div id="settings-content" class="settings-content"></div>
            </div>
        </div>
    </main>

    <!-- Modal: Generic Product -->
    <div id="modal-generic" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Artigo Genérico</h3>
                <button class="modal-close" onclick="pos.closeGenericModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Descrição</label>
                    <div class="input-with-keyboard">
                        <input type="text" id="generic-description" placeholder="Ex: Rifa, Entrada..." class="form-input">
                        <button class="btn-keyboard" data-target="generic-description" data-label="Descrição">⌨</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Valor (€)</label>
                    <input type="number" id="generic-value" placeholder="0.00" step="0.01" min="0.01" class="form-input form-input-large">
                </div>
                <div class="numpad" id="generic-numpad">
                    <button class="numpad-btn" onclick="pos.numpadInput('1')">1</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('2')">2</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('3')">3</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('4')">4</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('5')">5</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('6')">6</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('7')">7</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('8')">8</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('9')">9</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('.')">.</button>
                    <button class="numpad-btn" onclick="pos.numpadInput('0')">0</button>
                    <button class="numpad-btn numpad-delete" onclick="pos.numpadInput('del')">⌫</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="pos.closeGenericModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="pos.addGenericItem()">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Cash Session -->
    <div id="modal-session" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="session-modal-title">Abrir Caixa</h3>
                <button class="modal-close" onclick="app.closeSessionModal()">✕</button>
            </div>
            <div class="modal-body" id="session-modal-body"></div>
            <div class="modal-footer" id="session-modal-footer"></div>
        </div>
    </div>

    <!-- Modal: General Purpose -->
    <div id="modal-form" class="modal">
        <div class="modal-content modal-content-wide">
            <div class="modal-header">
                <h3 id="form-modal-title">Formulário</h3>
                <button class="modal-close" onclick="app.closeFormModal()">✕</button>
            </div>
            <div class="modal-body" id="form-modal-body"></div>
            <div class="modal-footer" id="form-modal-footer"></div>
        </div>
    </div>

    <!-- Modal: Virtual Keyboard -->
    <div id="modal-keyboard" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="vk-label">Texto</h3>
                <button class="modal-close" onclick="virtualKeyboard._cancel()">✕</button>
            </div>
            <div class="modal-body">
                <div id="vk-display" class="vk-display"></div>
                <div id="vk-keyboard" class="vk-keyboard"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="virtualKeyboard._cancel()">Cancelar</button>
                <button class="btn btn-primary" onclick="virtualKeyboard._confirm()">OK — Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Modal: PIN Security -->
    <div id="modal-pin" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Definições</h3>
            </div>
            <div class="modal-body" style="text-align:center;">
                <p style="margin-bottom:16px; color:var(--text-light);">Introduza o PIN de acesso</p>
                <div class="pin-dots" id="pin-dots">
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                </div>
                <p class="pin-error" id="pin-error"></p>
                <div class="numpad">
                    <button class="numpad-btn" onclick="pinAuth._onDigit('1')">1</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('2')">2</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('3')">3</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('4')">4</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('5')">5</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('6')">6</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('7')">7</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('8')">8</button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('9')">9</button>
                    <button class="numpad-btn" style="visibility:hidden;" disabled></button>
                    <button class="numpad-btn" onclick="pinAuth._onDigit('0')">0</button>
                    <button class="numpad-btn numpad-delete" onclick="pinAuth._onBackspace()">&#x232B;</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="pinAuth.cancel()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal: PIN Input Numpad -->
    <div id="modal-pin-input" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="pin-input-label">PIN</h3>
            </div>
            <div class="modal-body" style="text-align:center;">
                <div class="pin-dots" id="pin-input-dots">
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                    <span class="pin-dot"></span>
                </div>
                <div class="numpad">
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('1')">1</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('2')">2</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('3')">3</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('4')">4</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('5')">5</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('6')">6</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('7')">7</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('8')">8</button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('9')">9</button>
                    <button class="numpad-btn" style="visibility:hidden;" disabled></button>
                    <button class="numpad-btn" onclick="pinNumpad._onDigit('0')">0</button>
                    <button class="numpad-btn numpad-delete" onclick="pinNumpad._onBackspace()">&#x232B;</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="pinNumpad._cancel()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Change Calculator -->
    <div id="modal-change" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Troco</h3>
            </div>
            <div class="modal-body" style="text-align:center;">
                <p style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">Total da conta</p>
                <div id="change-total-display" style="font-size:28px; font-weight:800; margin-bottom:20px;"></div>
                <p style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">Valor entregue pelo cliente</p>
                <input type="text" id="change-amount-input" readonly class="form-input form-input-large" placeholder="0,00" style="text-align:center; margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding:12px 16px; background:var(--bg); border-radius:var(--radius-sm);">
                    <span style="font-size:14px; font-weight:600;">Troco</span>
                    <span id="change-result" style="font-size:20px; font-weight:800; color:var(--text-muted);">---</span>
                </div>
                <div class="numpad">
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('1')">1</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('2')">2</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('3')">3</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('4')">4</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('5')">5</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('6')">6</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('7')">7</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('8')">8</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('9')">9</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('.')">.</button>
                    <button class="numpad-btn" onclick="pos.changeNumpadInput('0')">0</button>
                    <button class="numpad-btn numpad-delete" onclick="pos.changeNumpadInput('del')">&#x232B;</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="pos.closeChangeModal()">Cancelar</button>
                <button id="btn-confirm-change" class="btn btn-success" onclick="pos.confirmCashPayment()" disabled>Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/bridge.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pos.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/history.js"></script>
    <script src="js/pin.js"></script>
</body>
</html>
